<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>기술뉴스 레이더 · Tech News Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg: #0a0e14;
    --panel: #11161f;
    --panel-2: #161c27;
    --line: #232c3a;
    --text: #d7dee8;
    --muted: #7c8aa0;
    --dim: #4a566a;
    --accent: #36e2b4;       /* teal — 계기판 형광 */
    --accent-2: #ffb454;     /* amber */
    --accent-3: #5ac8fa;     /* cyan */
    --danger: #ff6b6b;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "IBM Plex Mono", monospace;
    font-size: 14px;
    line-height: 1.5;
  }

  body {
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 44px 44px;
    background-position: -1px -1px;
  }
  /* 격자 위에 살짝 비네팅 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(120% 90% at 50% -10%, transparent 40%, rgba(10,14,20,0.9) 100%);
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1500px; margin: 0 auto; padding: 28px 20px 64px; }

  header { border-bottom: 1px solid var(--line); padding-bottom: 18px; margin-bottom: 22px; }

  .title-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }

  h1 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800;
    font-size: clamp(26px, 4vw, 44px);
    letter-spacing: -0.02em;
    margin: 0;
    color: #fff;
  }
  h1 .blink {
    display: inline-block;
    width: 12px; height: 12px;
    margin-left: 4px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

  .subtitle { color: var(--muted); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; }

  .meta-bar {
    display: flex; flex-wrap: wrap; gap: 10px 22px;
    margin-top: 14px; font-size: 12px; color: var(--muted);
  }
  .meta-bar b { color: var(--accent-2); font-weight: 600; }

  .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-top: 18px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all .12s ease;
    white-space: nowrap;
  }
  .chip:hover { color: var(--text); border-color: var(--dim); }
  .chip.active {
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
  }
  .chip .n { opacity: .7; margin-left: 4px; }

  .search {
    flex: 1 1 220px;
    min-width: 180px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 9px 14px;
    color: var(--text);
    font-family: "IBM Plex Mono", monospace;
    font-size: 13px;
    outline: none;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--dim); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    margin-top: 24px;
  }

  .col {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .col-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.015);
  }
  .col-head h2 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin: 0;
    letter-spacing: -0.01em;
    color: #fff;
  }
  .col-head .cnt {
    font-size: 11px; color: var(--accent);
    border: 1px solid var(--line);
    border-radius: 6px; padding: 2px 8px;
  }

  .items { list-style: none; margin: 0; padding: 6px; overflow-y: auto; }

  .item {
    padding: 11px 12px;
    border-radius: 8px;
    border-left: 2px solid transparent;
  }
  .item:hover { background: rgba(54,226,180,0.05); border-left-color: var(--accent); }
  .item + .item { margin-top: 2px; }

  .item a {
    color: var(--text);
    text-decoration: none;
    font-size: 13.5px;
    line-height: 1.45;
    display: block;
  }
  .item a:hover { color: #fff; text-decoration: underline; text-underline-offset: 3px; }

  .item-meta {
    margin-top: 6px;
    display: flex; gap: 10px; align-items: center;
    font-size: 11px; color: var(--muted);
  }
  .item-meta .src { color: var(--accent-3); }
  .item-meta .time { color: var(--dim); }
  .item-meta .time.fresh { color: var(--accent-2); }

  .empty-col { padding: 22px 16px; color: var(--dim); font-size: 12px; }

  .notice {
    margin-top: 40px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 40px 20px;
  }
  .notice.error { color: var(--danger); border-color: rgba(255,107,107,0.4); }

  footer { margin-top: 40px; color: var(--dim); font-size: 11px; text-align: center; }
  footer a { color: var(--muted); }

  /* 스크롤바 */
  .items::-webkit-scrollbar { width: 8px; }
  .items::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  .items::-webkit-scrollbar-thumb:hover { background: var(--dim); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title-row">
      <h1>기술뉴스 레이더<span class="blink"></span></h1>
      <span class="subtitle">EV · Battery · Motor · Robotics · AI</span>
    </div>
    <div class="meta-bar">
      <span>last sync: <b id="genTime">—</b></span>
      <span>total items: <b id="totalCount">—</b></span>
      <span id="ageNote"></span>
    </div>
    <div class="controls">
      <div class="chips" id="chips"></div>
      <input class="search" id="search" type="search"
             placeholder="제목·출처 검색…" autocomplete="off" spellcheck="false" />
    </div>
  </header>

  <main id="main">
    <div class="notice" id="loading">데이터를 불러오는 중…</div>
    <div class="grid" id="grid" hidden></div>
  </main>

  <footer>
    GitHub Actions로 주기 수집 · 정적 페이지로 서빙 ·
    소스 편집은 <code>feeds.json</code>
  </footer>
</div>

<script>
"use strict";

var state = {
  data: null,
  activeCat: "all",
  query: ""
};

// --- XSS 방지: 텍스트 escape ---
function esc(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// --- 상대시간 ---
function relativeTime(iso) {
  if (!iso) return { label: "날짜 미상", fresh: false };
  var t = Date.parse(iso);
  if (isNaN(t)) return { label: "날짜 미상", fresh: false };
  var diff = Date.now() - t;
  var sec = Math.floor(diff / 1000);
  if (sec < 0) sec = 0;
  var min = Math.floor(sec / 60);
  var hr = Math.floor(min / 60);
  var day = Math.floor(hr / 24);
  if (sec < 60) return { label: "방금", fresh: true };
  if (min < 60) return { label: min + "분 전", fresh: true };
  if (hr < 24) return { label: hr + "시간 전", fresh: hr < 6 };
  if (day < 7) return { label: day + "일 전", fresh: false };
  var d = new Date(t);
  var label = d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
  return { label: label, fresh: false };
}

function fmtDateTime(iso) {
  if (!iso) return "—";
  var t = Date.parse(iso);
  if (isNaN(t)) return "—";
  var d = new Date(t);
  return d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0") + " " +
    String(d.getHours()).padStart(2, "0") + ":" +
    String(d.getMinutes()).padStart(2, "0");
}

function matchesQuery(item, q) {
  if (!q) return true;
  var hay = (item.title + " " + item.source).toLowerCase();
  return hay.indexOf(q) !== -1;
}

function renderChips() {
  var chips = document.getElementById("chips");
  var cats = state.data.categories || [];
  var total = cats.reduce(function (a, c) { return a + (c.count || 0); }, 0);

  var html = '<button class="chip ' + (state.activeCat === "all" ? "active" : "") +
    '" data-cat="all">전체<span class="n">' + total + '</span></button>';
  cats.forEach(function (c) {
    html += '<button class="chip ' + (state.activeCat === c.key ? "active" : "") +
      '" data-cat="' + esc(c.key) + '">' + esc(c.label) +
      '<span class="n">' + (c.count || 0) + '</span></button>';
  });
  chips.innerHTML = html;

  Array.prototype.forEach.call(chips.querySelectorAll(".chip"), function (btn) {
    btn.addEventListener("click", function () {
      state.activeCat = btn.getAttribute("data-cat");
      renderChips();
      renderGrid();
    });
  });
}

function renderGrid() {
  var grid = document.getElementById("grid");
  var cats = state.data.categories || [];
  var q = state.query;
  var visible = cats.filter(function (c) {
    return state.activeCat === "all" || c.key === state.activeCat;
  });

  var anyShown = 0;
  var out = "";

  visible.forEach(function (c) {
    var items = (c.items || []).filter(function (it) { return matchesQuery(it, q); });
    anyShown += items.length;

    var body;
    if (items.length === 0) {
      body = '<div class="empty-col">' +
        (q ? "검색 결과 없음" : "표시할 항목이 없습니다") + "</div>";
    } else {
      body = '<ul class="items">';
      items.forEach(function (it) {
        var rt = relativeTime(it.published);
        var link = it.link ? esc(it.link) : "#";
        body += '<li class="item">' +
          '<a href="' + link + '" target="_blank" rel="noopener noreferrer">' +
            esc(it.title || "(제목 없음)") + '</a>' +
          '<div class="item-meta">' +
            '<span class="src">' + esc(it.source || "") + '</span>' +
            '<span class="time' + (rt.fresh ? " fresh" : "") + '" title="' +
              esc(fmtDateTime(it.published)) + '">' + esc(rt.label) + '</span>' +
          '</div>' +
        '</li>';
      });
      body += "</ul>";
    }

    out += '<section class="col">' +
      '<div class="col-head"><h2>' + esc(c.label) + '</h2>' +
      '<span class="cnt">' + items.length + '</span></div>' +
      body +
    '</section>';
  });

  if (anyShown === 0 && q) {
    grid.hidden = true;
    showNotice('"' + esc(q) + '" 에 대한 검색 결과가 없습니다.', false);
    return;
  }

  hideNotice();
  grid.innerHTML = out;
  grid.hidden = false;
}

function showNotice(msg, isError) {
  var grid = document.getElementById("grid");
  grid.hidden = true;
  var el = document.getElementById("loading");
  el.hidden = false;
  el.className = "notice" + (isError ? " error" : "");
  el.innerHTML = msg;
}
function hideNotice() {
  document.getElementById("loading").hidden = true;
}

function applyData(data) {
  state.data = data;

  var cats = data.categories || [];
  var total = cats.reduce(function (a, c) { return a + (c.count || 0); }, 0);
  document.getElementById("genTime").textContent = fmtDateTime(data.generated_at) + " UTC";
  document.getElementById("totalCount").textContent = total;

  if (total === 0) {
    renderChips();
    showNotice("수집된 항목이 없습니다. feeds.json의 피드 URL과 필터를 확인하세요.", false);
    return;
  }

  renderChips();
  renderGrid();
}

function load() {
  fetch("data.json?_=" + Date.now(), { cache: "no-store" })
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(applyData)
    .catch(function (err) {
      showNotice(
        "데이터를 불러오지 못했습니다. (" + esc(err.message) + ")<br>" +
        "data.json이 생성되었는지, GitHub Actions가 1회 이상 실행됐는지 확인하세요.",
        true
      );
    });
}

document.getElementById("search").addEventListener("input", function (e) {
  state.query = e.target.value.trim().toLowerCase();
  if (state.data) renderGrid();
});

load();
</script>
</body>
</html>
